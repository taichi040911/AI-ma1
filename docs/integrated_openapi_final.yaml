components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    RegisterRequest:
      type: object
      required: [email, password, agreed_to_terms, agreed_to_privacy]
      properties:
        email: { type: string, format: email }
        password: { type: string }
        agreed_to_terms: { type: boolean }
        agreed_to_privacy: { type: boolean }

    RegisterResponse:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: object
          properties:
            user_id: { type: string, format: uuid }
            email: { type: string }
            status: { type: string }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }

    LoginResponse:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: object
          properties:
            access_token: { type: string }
            refresh_token: { type: string }
            user:
              type: object
              properties:
                id: { type: string, format: uuid }
                status: { type: string }
                onboarding_completed: { type: boolean }

    SendOtpRequest:
      type: object
      required: [channel, destination]
      properties:
        channel:
          type: string
          enum: [email, sms]
        destination: { type: string }

    SendOtpResponse:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: object
          properties:
            sent: { type: boolean }
            expires_in_seconds: { type: integer }

    VerifyOtpRequest:
      type: object
      required: [channel, destination, code]
      properties:
        channel:
          type: string
          enum: [email, sms]
        destination: { type: string }
        code: { type: string }

    VerifyOtpResponse:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: object
          properties:
            verified: { type: boolean }

    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string }
        status: { type: string }

    Profile:
      type: object
      properties:
        nickname: { type: string }
        birth_date: { type: string, format: date }
        gender: { type: string }
        prefecture: { type: string }
        city: { type: string }
        bio: { type: string }
        ai_summary: { type: string }
        verification_status: { type: string }
        current_connection_style_hint: { type: string, nullable: true }
        preferred_entry_mode: { type: string, nullable: true }

    AvailabilitySlot:
      type: object
      properties:
        day_of_week: { type: integer }
        start_time: { type: string }
