openapi: 3.0.3
info:
  title: AI Companion Matching App API
  version: 2.0.0
  description: >
    AI伴走型総合マッチングアプリの最終統合OpenAPI。
    認証、オンボーディング、AI診断、AIライフナビ、Today/伴走プラン、
    共同行動、推薦、関係ステージ、チャット、イベント、安全機能、
    通知、課金・entitlement を含む。

servers:
  - url: https://api.example.com/v1
    description: Production
  - url: https://staging-api.example.com/v1
    description: Staging

security:
  - bearerAuth: []

tags:
  - name: Auth
  - name: Me
  - name: Verification
  - name: AI Diagnosis
  - name: AI Life Navigation
  - name: Weekly Plan
  - name: Co-Actions
  - name: Recommendations
  - name: Relationships
  - name: Likes & Matches
  - name: Chat
  - name: Events
  - name: Reflection
  - name: Emotional State
  - name: Reports
  - name: Notifications
  - name: Billing
  - name: Entitlements
  - name: Usage
  - name: Billing Webhooks

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: 新規会員登録
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: 登録成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: 重複メール
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags: [Auth]
      summary: ログイン
